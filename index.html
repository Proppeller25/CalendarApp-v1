<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calender</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <header>
      <h1>MY CALENDAR</h1>
    </header>
    <section class="calendarLayout">
      <div class="calendarPanel">
        <div class="yearDiv">
          <button class="navButton previousYear" aria-label="Previous Year">Previous Year</button>
          <button class="navButton previousMonth" aria-label="Previous Month">Previous Month</button>
          <div class="monthYearDisplay">
            <span class="yearText">April, 2026</span>
            <button class="resetButton" aria-label="Reset Calendar">Today</button>
          </div>
          
          <button class="navButton nextMonth" aria-label="Next Month">Next Month</button>
          <button class="navButton nextYear" aria-label="Next Year">Next Year</button>
        </div>
        <div class="tableWrap">
          <table class="datesTable">
            <thead>
              <tr>
                <th><span class="day-full">Sunday</span><span class="day-short">Sun</span></th>
                <th><span class="day-full">Monday</span><span class="day-short">Mon</span></th>
                <th><span class="day-full">Tuesday</span><span class="day-short">Tue</span></th>
                <th><span class="day-full">Wednesday</span><span class="day-short">Wed</span></th>
                <th><span class="day-full">Thursday</span><span class="day-short">Thu</span></th>
                <th><span class="day-full">Friday</span><span class="day-short">Fri</span></th>
                <th><span class="day-full">Saturday</span><span class="day-short">Sat</span></th>
              </tr>
            </thead>
            <tbody>
                
            </tbody>
          </table>
        </div>
      </div>

      <section class="controlsPanel" aria-label="Calendar controls">
        <div class="controlGroup jumpGroup">
          <label class="controlLabel" for="jumpTo">Jump to</label>
          <input type="month" class="jumpToInput" name="jumpTo" id="jumpTo">
        </div>
      </section>
      <aside class="dayViewSlot" aria-hidden="true">

      </aside>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
