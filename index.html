<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calender</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <header>
      <h1>MY CALENDAR</h1>
    </header>
    <section class="calendarLayout">
      <div class="calendarPanel">
        <div class="yearDiv">
          <div class="displayGroup">
            <button class="navButton previousMonth" aria-label="Previous Month">&#8592;</button>
            <span class="monthText">April</span>
            <button class="navButton nextMonth" aria-label="Next Month">&#8594;</button>
          </div>
          <div class="displayGroup">
            <button class="navButton previousYear" aria-label="Previous Year">&#8592;</button>
            <span class="yearText">2026</span>
            <button class="navButton nextYear" aria-label="Next Year">&#8594;</button>
          </div>
          <div class="monthYearDisplay">
            <div class="controlGroup jumpGroup">
              <label class="controlLabel" for="jumpTo">Jump to</label>
              <input type="month" class="jumpToInput" name="jumpTo" id="jumpTo">
            </div>
            <button class="resetButton" aria-label="Reset Calendar">Today</button>
          </div>
        </div>
        <div class="tableWrap">
          <table class="datesTable">
            <thead>
              <tr>
                <th><span class="day-full">Sunday</span><span class="day-short">Sun</span></th>
                <th><span class="day-full">Monday</span><span class="day-short">Mon</span></th>
                <th><span class="day-full">Tuesday</span><span class="day-short">Tue</span></th>
                <th><span class="day-full">Wednesday</span><span class="day-short">Wed</span></th>
                <th><span class="day-full">Thursday</span><span class="day-short">Thu</span></th>
                <th><span class="day-full">Friday</span><span class="day-short">Fri</span></th>
                <th><span class="day-full">Saturday</span><span class="day-short">Sat</span></th>
              </tr>
            </thead>
            <tbody>
                
            </tbody>
          </table>
        </div>
      </div>
    </section>
    <aside class="dayView">
      <div class="davViewDiv">
        <div class="dayViewHeader">
          <div class="dayViewTitle">DAY</div>
          <button class="closeDayView" aria-label="Close Day View">&#10005;</button>
        </div>
        <div class="dayViewBody"></div>
        <button class="addEventButton" aria-label="Create Event">+</button>
      </div>
    </aside>
  </main>
  <script src="index.js"></script>
</body>
</html>
