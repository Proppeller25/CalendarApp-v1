<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calender</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <header>
      <h1>MY CALENDAR</h1>
    </header>
    <section class="calendarLayout">
      <div class="calendarPanel">
        <div class="yearDiv">
          April, 2026
        </div>
        <div class="tableWrap">
          <table class="datesTable">
            <thead>
              <tr>
                <th><span class="day-full">Sunday</span><span class="day-short">Sun</span></th>
                <th><span class="day-full">Monday</span><span class="day-short">Mon</span></th>
                <th><span class="day-full">Tuesday</span><span class="day-short">Tue</span></th>
                <th><span class="day-full">Wednesday</span><span class="day-short">Wed</span></th>
                <th><span class="day-full">Thursday</span><span class="day-short">Thu</span></th>
                <th><span class="day-full">Friday</span><span class="day-short">Fri</span></th>
                <th><span class="day-full">Saturday</span><span class="day-short">Sat</span></th>
              </tr>
            </thead>
            <tbody>
                
            </tbody>
          </table>
        </div>
      </div>

      <div>
        <button class="previousMonth">Previous Month</button>

        <button class="nextMonth">Next Month</button>
      </div>

      <div>
        <button class="previousYear">Previous Year</button>

        <button class="nextYear">Next Year</button>
      </div>

      <div>
        <label for="jumpTo">Jump to:</label>
        <input type="month" class="jumpToInput" name="jumpTo">
      </div>
      <aside class="dayViewSlot" aria-hidden="true">

      </aside>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
